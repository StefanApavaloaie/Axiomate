<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiomate SDK Test Hub</title>

    <!-- 
      ========================================================
      AXIOMATE TRACKING SNIPPET
      ========================================================
      Paste this into the <head> of any website to start tracking.
    -->
    <!-- Paste this in your <head> -->
    <script src="http://localhost/axiomate.js?v=3" async></script>
    <script>
        window.axiomate = window.axiomate || [];
        window.axiomate.push(["init", "axm_live_hNNaVWcpjJt00cdsDLKfYTZgr11_AIWeMvEyC3Gf4ME"]);

        // Example usage (optional)
        // window.axiomate.push(["track", "user_signed_up", { plan: "Pro" }]);
    </script>
    <!-- ======================================================== -->

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
            background: #0f172a;
            color: #f8fafc;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-top: 20px;
        }

        button {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin: 10px;
        }

        button:hover {
            background: #0284c7;
        }

        .log {
            background: #000;
            color: #4ade80;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            text-align: left;
            margin-top: 20px;
            min-height: 100px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <h1>Axiomate SDK Test Hub</h1>
    <p>If you placed your API Key in the HTML, a <code style="color:#38bdf8">page_view</code> event was just sent!</p>

    <div class="card">
        <h3>Trigger Custom Events</h3>
        <p>Click these buttons to test the `axiomate.track()` function.</p>

        <button onclick="trackPurchase()">Buy Premium ($99)</button>
        <button onclick="trackSignup()">Sign Up to Newsletter</button>

        <div class="log" id="termLog">Axiomate integration initialized.</div>
    </div>

    <script>
        function logMsg(msg) {
            const el = document.getElementById("termLog");
            el.innerHTML += "<br>> " + msg;
        }

        function trackPurchase() {
            logMsg("window.axiomate.push(['track', 'purchase_complete', { amount: 99.00, tier: 'Premium' }])");
            window.axiomate.push(['track', 'purchase_complete', { amount: 99.00, tier: 'Premium' }]);
        }

        function trackSignup() {
            logMsg("window.axiomate.push(['track', 'newsletter_signup', { location: 'footer' }])");
            window.axiomate.push(['track', 'newsletter_signup', { location: 'footer' }]);
        }
    </script>
</body>

</html>

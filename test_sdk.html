    <h1>Axiomate SDK Test Hub</h1>

    <div class="card">
        <h3>Trigger Custom Events</h3>
        <p>Click these buttons to test the `axiomate.track()` function.</p>

        <button onclick="trackPurchase()">Buy Premium ($99)</button>
        <button onclick="trackSignup()">Sign Up to Newsletter</button>

    <script>
        function logMsg(msg) {
            const el = document.getElementById("termLog");
            el.innerHTML += "<br>> " + msg;
        }

        function trackPurchase() {
            logMsg("axiomate.track('purchase_complete', { amount: 99.00, tier: 'Premium' })");

            axiomate.track('purchase_complete', { amount: 99.00, tier: 'Premium' });
        }

        function trackSignup() {
            logMsg("axiomate.track('newsletter_signup', { location: 'footer' })");
            axiomate.track('newsletter_signup', { location: 'footer' });
        }
